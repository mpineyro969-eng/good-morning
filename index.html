<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Good Morning Surprise! 🐱</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&family=Comic+Neue:wght@700&display=swap');
        :root { --bg: #c8f7c5; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            touch-action: manipulation;
            user-select: none;
        }
        .initial { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .title { 
            font-family: 'Comic Neue', cursive;
            font-size: clamp(3rem, 13vw, 6.5rem);
            text-align: center;
            text-shadow: 6px 6px 0 #fff, -3px -3px 0 #fff;
            animation: bounce 2s infinite;
        }
        .subtitle { font-size: clamp(1.4rem, 5.5vw, 1.9rem); margin: 2rem 0 4rem; text-align: center; max-width: 90%; }
        .btn {
            padding: 28px 75px;
            font-size: clamp(1.7rem, 7vw, 2.3rem);
            background: linear-gradient(45deg, #ff6b6b, #ffd93d);
            color: white;
            border: none;
            border-radius: 60px;
            font-weight: bold;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            cursor: pointer;
        }
        @keyframes bounce { 50% { transform: translateY(-28px); } }

        .explosion { position: absolute; inset: 0; z-index: 200; display: none; pointer-events: none; }
        .flash { position: absolute; inset: 0; background: white; opacity: 0; }
        .fire { 
            position: absolute; border-radius: 50%; 
            background: radial-gradient(circle, #ffff00, #ff4400); 
            box-shadow: 0 0 60px #ff8800;
            animation: boom 1.6s forwards;
        }
        @keyframes boom {
            0% { transform: scale(0.2); opacity: 1; }
            50% { transform: scale(3.2); }
            100% { transform: scale(0.1) translate(var(--x), var(--y)); opacity: 0; }
        }

        .post { position: absolute; inset: 0; display: none; flex-direction: column; align-items: center; padding-top: 14vh; z-index: 50; }
        .greeting { 
            font-family: 'Comic Neue', cursive;
            font-size: clamp(2.8rem, 11vw, 4.8rem);
            text-align: center;
            text-shadow: 5px 5px 0 #fff;
        }

        .cats { position: absolute; inset: 0; overflow: hidden; z-index: 10; }
        .cat, .modern-gif {
            position: absolute;
            border: 6px solid white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
            animation: chaos 11s linear infinite;
        }
        .cat video, .modern-gif img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover;
        }

        @keyframes chaos {
            0% { transform: rotate(0deg) translate(0,0); }
            25% { transform: rotate(38deg) translate(70px, -90px); }
            50% { transform: rotate(-28deg) translate(100px, 60px); }
            75% { transform: rotate(25deg) translate(-80px, -70px); }
            100% { transform: rotate(0deg) translate(0,0); }
        }

        .more-btn, .sound-btn {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            padding: 18px 60px; font-size: 1.6rem;
            background: linear-gradient(45deg, #4caf50, #8bc34a);
            color: white; border: none; border-radius: 50px;
            z-index: 300; box-shadow: 0 10px 30px rgba(0,0,0,0.3); font-weight: bold;
        }

        .sound-btn {
            bottom: 100px;
            background: linear-gradient(45deg, #ff6b6b, #ff8c00);
        }

        .confetti { position: absolute; z-index: 30; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(130vh) rotate(1080deg); opacity: 0; } }
    </style>
</head>
<body>

    <div class="initial" id="initial">
        <h1 class="title">Good Morning 🌸</h1>
        <p class="subtitle">Click for a surprise… hurry up 👀</p>
        <button class="btn" id="openBtn">CLICK TO HAVE A BETTER DAY</button>
    </div>

    <div class="explosion" id="explosion">
        <div class="flash" id="flash"></div>
    </div>

    <div class="post" id="post">
        <h1 class="greeting">Hope you have a nice day ☀️</h1>
        <button class="more-btn" id="moreBtn">MORE CATS 🐱</button>
        <button class="sound-btn" id="soundBtn" style="display:none;">🔊 TURN ON SOUND</button>
    </div>

    <div class="cats" id="cats"></div>

    <script>
        const VIDEO_URL = "https://files.catbox.moe/k0o8ds.mp4";
        const MODERN_FAMILY_GIF = "https://media.giphy.com/media/3o7TKyryTbhKYkAn8k/giphy.gif";

        let catCount = 0;

        function createCat() {
            if (catCount > 70) return;
            const container = document.getElementById('cats');
            const div = document.createElement('div');
            div.className = 'cat';
            const size = 105 + Math.random() * 140;
            div.style.width = size + 'px';
            div.style.height = size + 'px';
            div.style.left = Math.random() * 105 - 10 + 'vw';
            div.style.top = Math.random() * 85 + 'vh';
            div.style.animationDuration = (7 + Math.random() * 14) + 's';
            div.style.animationDelay = '-' + Math.random() * 12 + 's';

            const video = document.createElement('video');
            video.src = VIDEO_URL;
            video.loop = true;
            video.muted = true;           // Starts muted
            video.playsInline = true;
            video.autoplay = true;
            div.appendChild(video);
            container.appendChild(div);
            video.play().catch(() => {});
            catCount++;
        }

        function createModernGif() {
            const container = document.getElementById('cats');
            const div = document.createElement('div');
            div.className = 'modern-gif';
            const size = 130 + Math.random() * 160;
            div.style.width = size + 'px';
            div.style.height = size + 'px';
            div.style.left = Math.random() * 105 - 15 + 'vw';
            div.style.top = Math.random() * 80 + 'vh';
            div.style.animationDuration = (6 + Math.random() * 13) + 's';
            div.style.animationDelay = '-' + Math.random() * 10 + 's';

            const img = document.createElement('img');
            img.src = MODERN_FAMILY_GIF;
            div.appendChild(img);
            container.appendChild(div);
        }

        function spawnCats(num) {
            for (let i = 0; i < num; i++) {
                setTimeout(() => Math.random() > 0.6 ? createModernGif() : createCat(), i * 25);
            }
        }

        function confettiBurst() {
            const colors = ['#ff6b6b','#4ecdc4','#45b7d1','#96ceb4','#ffe66d'];
            for (let i = 0; i < 160; i++) {
                const c = document.createElement('div');
                c.className = 'confetti';
                c.style.left = Math.random() * 100 + 'vw';
                c.style.background = colors[Math.floor(Math.random()*colors.length)];
                c.style.width = (7 + Math.random()*14) + 'px';
                c.style.height = c.style.width;
                c.style.animationDuration = (2.8 + Math.random()*4) + 's';
                c.style.animationDelay = '-' + Math.random()*3 + 's';
                document.body.appendChild(c);
                setTimeout(() => c.remove(), 12000);
            }
        }

        function triggerExplosion() {
            const exp = document.getElementById('explosion');
            const flash = document.getElementById('flash');
            exp.style.display = 'block';
            flash.style.transition = 'none';
            flash.style.opacity = '0.95';
            setTimeout(() => { flash.style.transition = 'opacity 0.8s'; flash.style.opacity = '0'; }, 80);

            for (let i = 0; i < 75; i++) {
                const f = document.createElement('div');
                f.className = 'fire';
                f.style.left = '50%'; f.style.top = '45%';
                f.style.width = (18 + Math.random() * 55) + 'px';
                f.style.height = f.style.width;
                const dx = (Math.random() - 0.5) * 1000;
                const dy = (Math.random() - 0.5) * 700 - 50;
                f.style.setProperty('--x', dx + 'px');
                f.style.setProperty('--y', dy + 'px');
                f.style.animationDelay = Math.random() * 0.35 + 's';
                exp.appendChild(f);
                setTimeout(() => f.remove(), 2600);
            }

            let shakes = 0;
            const shake = setInterval(() => {
                document.body.style.transform = `translate(${Math.random()*28-14}px, ${Math.random()*28-14}px)`;
                shakes++;
                if (shakes > 16) {
                    clearInterval(shake);
                    document.body.style.transform = 'none';
                }
            }, 50);

            setTimeout(() => {
                document.getElementById('initial').style.display = 'none';
                document.getElementById('post').style.display = 'flex';
                exp.style.display = 'none';
                spawnCats(28);
                confettiBurst();
                setInterval(confettiBurst, 2200);
                
                // Show sound button
                setTimeout(() => {
                    document.getElementById('soundBtn').style.display = 'block';
                }, 1500);
            }, 1700);
        }

        document.getElementById('openBtn').addEventListener('click', triggerExplosion);
        document.getElementById('moreBtn').addEventListener('click', () => { spawnCats(22); confettiBurst(); });

        // Sound button
        document.getElementById('soundBtn').addEventListener('click', function() {
            const videos = document.querySelectorAll('video');
            videos.forEach(v => {
                v.muted = false;
                v.play();
            });
            this.textContent = "🔊 SOUND ON!";
            this.style.background = "#4caf50";
        });
    </script>
</body>
</html>
