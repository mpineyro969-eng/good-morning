<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Surprise</title>
<style>
html,body{
margin:0;height:100%;overflow:hidden;background:#c8f7c5;
font-family:Arial,sans-serif;
}
#intro,#main{
position:absolute;inset:0;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}
#main{
display:none;
overflow:auto;
justify-content:flex-start;
padding-top:110px;
box-sizing:border-box;
}
h1{font-size:2.8rem;text-align:center;margin:10px}
p{font-size:1.2rem}
button{
padding:18px 32px;
font-size:1.3rem;
border:none;
border-radius:14px;
background:#222;color:#fff;
}
#flash{
position:fixed;inset:0;background:white;
opacity:0;pointer-events:none;
}
.grid{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:14px;
padding:20px;
width:100%;
box-sizing:border-box;
}
.cat{
width:min(240px,42vw);
border-radius:12px;
animation:float 1.8s ease-in-out infinite;
}
@keyframes float{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-8px)}
}
.shake{animation:shake .55s}
@keyframes shake{
0%,100%{transform:translate(0)}
20%{transform:translate(-10px,5px)}
40%{transform:translate(10px,-7px)}
60%{transform:translate(-8px,8px)}
80%{transform:translate(8px,-5px)}
}
</style>
</head>
<body>
<div id="flash"></div>

<div id="intro">
<h1>Good Morning 🌸</h1>
<p>Click for a surprise… hurry up 👀</p>
<button id="go">OPEN SURPRISE</button>
</div>

<div id="main">
<h1 style="position:sticky;top:0;background:#c8f7c5;padding:12px 0;width:100%;z-index:10;">
Hope you have a nice day ☀️
</h1>
<div class="grid" id="grid"></div>
</div>

<script>
const flash=document.getElementById("flash");
const intro=document.getElementById("intro");
const main=document.getElementById("main");
const grid=document.getElementById("grid");

document.getElementById("go").onclick=()=>{
document.body.classList.add("shake");
flash.style.opacity=1;
flash.style.transition="none";
setTimeout(()=>{
flash.style.transition="opacity 1s";
flash.style.opacity=0;
},80);

setTimeout(()=>{
intro.style.display="none";
main.style.display="flex";

for(let i=0;i<24;i++){
const img=document.createElement("img");
img.src="dance-party.gif";
img.className="cat";
img.style.animationDelay=(Math.random()*1.5)+"s";
grid.appendChild(img);
}
},1200);
};
</script>
</body>
</html>
